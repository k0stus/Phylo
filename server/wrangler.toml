name = "phylo-server"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "phylo-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "YOUR_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "INVITE_CODES"
id = "YOUR_INVITE_CODES_KV_ID"

[durable_objects]
bindings = [
  { name = "BATTLE_ROOM", class_name = "BattleRoom" },
  { name = "MATCHMAKING_QUEUE", class_name = "MatchmakingQueue" }
]

[[migrations]]
tag = "v1"
new_classes = ["BattleRoom", "MatchmakingQueue"]

[vars]
JWT_SECRET = "change-me-in-production"
FRONTEND_URL = "https://your-app.com"
INVITE_CODE_TTL_SECONDS = "600"
DAILY_SCAN_LIMIT = "5"
MATCHMAKING_TIMEOUT_SECONDS = "60"

# Run: wrangler secret put ANTHROPIC_API_KEY
# Run: wrangler secret put JWT_SECRET
